<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت نمرات دانش‌آموزان</title>

    <link rel="stylesheet" href="styles/add_score.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="page">

    <header class="page-header">

        <div>
            <h1>ثبت نمرات دانش‌آموزان</h1>
            <p>مدیریت و ثبت نمرات دانش‌آموزان</p>
        </div>

        <button class="theme-toggle-btn" onclick="toggleTheme()">
            <i data-lucide="sun" id="themeIcon"></i>
        </button>

    </header>


    <div class="card">

        <div class="filters">

            <div class="field">

                <label>انتخاب کلاس</label>

                <div class="select-wrapper">

                    <i data-lucide="users"></i>

                    <select id="classSelect" onchange="onClassChange()">
                        <option>درحال بارگذاری...</option>
                    </select>

                </div>

            </div>


            <div class="field">

                <label>انتخاب درس</label>

                <div class="select-wrapper">

                    <i data-lucide="book-open"></i>

                    <select id="subjectSelect"></select>

                </div>

            </div>


            <div class="field">

                <label>انتخاب دوره</label>

                <div class="select-wrapper">

                    <i data-lucide="calendar"></i>

                    <select id="periodSelect">

                        <option>مهر و آبان</option>
                        <option>آذر</option>
                        <option>دی (نوبت اول)</option>

                    </select>

                </div>

            </div>

        </div>

    </div>


    <div class="info-card">

        <div class="info-box">

            <i data-lucide="graduation-cap"></i>

            <div>

                <span>کلاس</span>

                <strong id="className">---</strong>

            </div>

        </div>

        <div class="info-box">

            <i data-lucide="users"></i>

            <div>

                <span>تعداد دانش‌آموز</span>

                <strong id="studentCount">0</strong>

            </div>

        </div>

        <div class="info-box">

            <i data-lucide="star"></i>

            <div>

                <span>حداکثر نمره</span>

                <strong>20</strong>

            </div>

        </div>

    </div>



    <div class="card">

        <div class="table-title">

            <h2>ثبت نمرات</h2>

        </div>

        <div class="table-container">

            <table>

                <thead>

                <tr>

                    <th>ردیف</th>

                    <th>نام و نام خانوادگی</th>

                    <th>کد ملی</th>

                    <th>نمره</th>

                </tr>

                </thead>

                <tbody id="studentTableBody">

                </tbody>

            </table>

        </div>

        <button id="submitBtn" class="submit-btn" onclick="openModal()">

            <i data-lucide="save"></i>

            <span>ثبت نهایی نمرات</span>

        </button>

    </div>

</div>


<div class="modal-overlay" id="confirmModal">

    <div class="modal-card">

        <div class="modal-icon">

            <i data-lucide="alert-circle"></i>

        </div>

        <h3>تأیید ثبت</h3>

        <p id="modalMessage"></p>

        <div class="modal-actions">

            <button class="btn-cancel" onclick="closeModal()">
                انصراف
            </button>

            <button class="btn-confirm" onclick="processSubmit()">
                ثبت نهایی
            </button>

        </div>

    </div>

</div>

<script src="js/script.js"></script>

</body>

</html>
