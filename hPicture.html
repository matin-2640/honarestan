<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>گالری تصاویر هنرستان راه دانش</title>
    <link rel="stylesheet" href="styles/style.css" />

    <link

            </div>
            <div class="pic-body">
              <div class="pic-meta">
                <span class="pic-date"
                  ><i class="fa-regular fa-calendar-days"></i> ۲۳ تیر ۱۴۰۵</span
                >
              </div>
            </div>
          </article>

          <article class="news-card">
            <div class="news-img-wrapper">

              <div class="pic-meta">
                <span class="pic-date"
                  ><i class="fa-regular fa-calendar-days"></i> ۱۵ تیر ۱۴۰۵</span

          <article class="news-card">

              <img class="gallery-img" src="./images/test.jpg" alt="تصویر" />
            </div>

                <span class="pic-date"
                  ><i class="fa-regular fa-calendar-days"></i> ۵ تیر ۱۴۰۵</span
                >
              </div>
            </div>
          </article>
        </div>

        <div class="back-to-home-container">
          <a href="index.html" class="btn-back-home">
            <i class="fa-solid fa-arrow-right"></i>
            <span>بازگشت به صفحه اصلی</span>
          </a>
        </div>
      </section>
    </main>

    <div id="lightbox" class="lightbox">
      <img id="lightbox-img" src="" alt="" />
    </div>
    <script src="https://unpkg.com/lenis@1.3.11/dist/lenis.min.js"></script>
