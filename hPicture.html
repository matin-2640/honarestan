<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>گالری تصاویر هنرستان راه دانش</title>
    <link rel="stylesheet" href="styles/style.css" />
    <!-- اتصال به فایل استایل اختصاصی اخبار -->
    <link rel="stylesheet" href="styles/action_styles.css" />

    <!-- فونت استاندارد وزیرمتن و آیکون‌های FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="news-page">
    <main class="container">
      <!-- ۱. سربرگ صفحه اخبار (Breadcrumb & Title) -->
      <section class="news-hero">
        <div class="news-hero-content">
          <span class="pic-badge">گالری تصاویر</span>
          <h1>گالری تصاویر بخش های متفاوت هنرستان</h1>
        </div>
      </section>

      <!-- ۲. گرید اصلی اخبار (آماده برای داینامیک‌سازی) -->
      <section class="news-list-section">
        <!-- گرید کارت‌ها -->
        <div class="news-archive-grid">
          <!-- نمونه خبر اول -->
          <article class="news-card">
            <div class="news-img-wrapper">
              <img
                class="gallery-img"
                src="./images/test.jpg"
                alt="تصویر"
              />
            </div>
            <div class="pic-body">
              <div class="pic-meta">
                <span class="pic-date"
                  ><i class="fa-regular fa-calendar-days"></i> ۲۳ تیر ۱۴۰۵</span
                >
              </div>
            </div>
          </article>

          <!-- نمونه خبر دوم -->
          <article class="news-card">
            <div class="news-img-wrapper">
              <img
                class="gallery-img"
                src="./images/test.jpg"
                alt="تصویر"
              />
            </div>
            <div class="pic-body">
              <div class="pic-meta">
                <span class="pic-date"
                  ><i class="fa-regular fa-calendar-days"></i> ۱۵ تیر ۱۴۰۵</span
                >
              </div>
            </div>
          </article>

          <!-- نمونه خبر سوم -->
          <article class="news-card">
            <div class="news-img-wrapper">
              <img
                class="gallery-img"
                src="./images/test.jpg"
                alt="تصویر"
              />
            </div>
            <div class="pic-body">
              <div class="pic-meta">
                <span class="pic-date"
                  ><i class="fa-regular fa-calendar-days"></i> ۱۰ تیر ۱۴۰۵</span
                >
              </div>
            </div>
          </article>

          <!-- نمونه خبر چهارم -->
          <article class="news-card">
            <div class="news-img-wrapper">
              <img
                class="gallery-img"
                src="./images/test.jpg"
                alt="تصویر"
              />
            </div>
            <div class="pic-body">
              <div class="pic-meta">
                <span class="pic-date"
                  ><i class="fa-regular fa-calendar-days"></i> ۵ تیر ۱۴۰۵</span
                >
              </div>
            </div>
          </article>
        </div>

        <!-- ۳. دکمه جدید بازگشت به صفحه اصلی در انتهای بخش اخبار -->
        <div class="back-to-home-container">
          <a href="index.html" class="btn-back-home">
            <i class="fa-solid fa-arrow-right"></i>
            <span>بازگشت به صفحه اصلی</span>
          </a>
        </div>
      </section>
    </main>


    <div id="lightbox" class="lightbox">
      <img id="lightbox-img" src="" alt="" />
    </div>
    <!-- لود اسکریپت تم برای همگام‌سازی حالت شب و روز با لندینگ اصلی -->
    <script src="https://unpkg.com/lenis@1.3.11/dist/lenis.min.js"></script>
    <script type="text/javascript" src="js/theme.js"></script>
  </body>
</html>
